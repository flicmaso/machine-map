<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Equipment Knowledge Base - GBP FCD</title>
  <meta name="description" content="Plant equipment and maintenance knowledge base for the De Pere packaging plant.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" />
  <style>
    html,body{height:100%}
    *{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    body{margin:0;font-family:ui-sans-serif,system-ui,sans-serif;color:#1E2226;background:#eaeff7}
    body::before{content:"";position:fixed;inset:-12%;z-index:-2;pointer-events:none;
      background:
        radial-gradient(46% 52% at 8% -8%, rgba(99,102,241,0.55), transparent 60%),
        radial-gradient(44% 50% at 96% -2%, rgba(168,85,247,0.48), transparent 58%),
        radial-gradient(40% 46% at 60% 8%, rgba(56,189,248,0.30), transparent 60%),
        radial-gradient(50% 54% at 88% 108%, rgba(240,164,0,0.34), transparent 58%),
        radial-gradient(48% 52% at -6% 104%, rgba(45,190,220,0.40), transparent 58%),
        radial-gradient(40% 44% at 40% 118%, rgba(236,72,153,0.26), transparent 60%),
        linear-gradient(165deg,#eef2fb 0%,#e4ebf7 45%,#eae6f5 100%);}
    body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
      background:radial-gradient(130% 62% at 50% -28%, rgba(255,255,255,0.62), transparent 58%);}
    .min-h-screen{background:transparent !important}
    .glasscard{border-radius:22px !important;
      -webkit-backdrop-filter:blur(26px) saturate(190%);backdrop-filter:blur(26px) saturate(190%);
      box-shadow:0 12px 34px -14px rgba(20,28,54,0.30),0 3px 10px -6px rgba(20,28,54,0.18),
        inset 0 1px 0 rgba(255,255,255,0.70),inset 0 -1px 0 rgba(255,255,255,0.10),
        inset 0 0 0 1px rgba(255,255,255,0.16) !important;}
    .glasscard.cursor-pointer:hover{box-shadow:0 18px 44px -14px rgba(20,28,54,0.36),
        0 4px 12px -6px rgba(20,28,54,0.20),inset 0 1px 0 rgba(255,255,255,0.80),
        inset 0 0 0 1px rgba(255,255,255,0.22) !important;}
    header{-webkit-backdrop-filter:blur(22px) saturate(180%) !important;
      backdrop-filter:blur(22px) saturate(180%) !important;background:rgba(255,255,255,0.55) !important;
      border-bottom:1px solid rgba(255,255,255,0.40) !important;}
    @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
      .glasscard{background:rgba(255,255,255,0.93) !important}
      header{background:rgba(246,248,252,0.96) !important}}
    @media (prefers-reduced-motion:no-preference){
      .glasscard{transition:box-shadow .35s ease, transform .35s ease}}
  </style>
</head>
